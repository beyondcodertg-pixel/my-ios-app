              };
              rootObject = 000000000000000000000017 /* Project object */;
          }
          EOF
          
          # Copy your HTML into the app
          cp index.html MyWebApp/MyWebApp/
          
          # Build the app for iPhone simulator (no signing needed)
          cd MyWebApp
          xcodebuild -project MyWebApp.xcodeproj -scheme MyWebApp -destination 'platform=iOS Simulator,name=iPhone 15' -allowProvisioningUpdates CODE_SIGNING_ALLOWED=NO
        shell: bash
