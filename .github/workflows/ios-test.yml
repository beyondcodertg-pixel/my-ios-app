                  };
                  000000000000000000000011 /* MyWebApp */ = {
                      isa = PBXGroup;
                      children = (
                          000000000000000000000002 /* AppDelegate.swift */,
                          000000000000000000000004 /* ViewController.swift */,
                          000000000000000000000006 /* index.html */,
                          000000000000000000000007 /* Info.plist */,
                      );
                      path = MyWebApp;
                      sourceTree = "<group>";
                  };
                  000000000000000000000012 /* Products */ = {
