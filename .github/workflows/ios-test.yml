                      defaultConfigurationIsVisible = 0;
                      defaultConfigurationName = Release;
                  };
                  000000000000000000000018 /* Build configuration list for PBXProject "MyWebApp" */ = {
                      isa = XCConfigurationList;
                      buildConfigurations = (
                          000000000000000000000021 /* Debug */,
                          000000000000000000000022 /* Release */,
