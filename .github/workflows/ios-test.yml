                  000000000000000000000003 /* ViewController.swift in Sources */ = {isa = PBXBuildFile; fileRef = 000000000000000000000004 /* ViewController.swift */; };
                  000000000000000000000005 /* index.html in Resources */ = {isa = PBXBuildFile; fileRef = 000000000000000000000006 /* index.html */; };
                  /* End PBXBuildFile section */
          
                  /* Begin PBXFileReference section */
                  000000000000000000000002 /* AppDelegate.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = AppDelegate.swift; sourceTree = "<group>"; };
                  000000000000000000000004 /* ViewController.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = ViewController.swift; sourceTree = "<group>"; };
                  000000000000000000000006 /* index.html */ = {isa = PBXFileReference; lastKnownFileType = text.html; path = index.html; sourceTree = "<group>"; };
                  000000000000000000000007 /* Info.plist */ = {isa = PBXFileReference; lastKnownFileType = text.plist.xml; path = Info.plist; sourceTree = "<group>"; };
                  000000000000000000000008 /* MyWebApp.app */ = {isa = PBXFileReference; explicitFileType = wrapper.application; includeInIndex = 0; path = MyWebApp.app; sourceTree = BUILT_PRODUCTS_DIR; };
