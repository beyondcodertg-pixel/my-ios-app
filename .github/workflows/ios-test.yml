                  };
                  /* End XCBuildConfiguration section */
          
                  /* Begin XCConfigurationList section */
                  000000000000000000000014 /* Build configuration list for PBXNativeTarget "MyWebApp" */ = {
                      isa = XCConfigurationList;
                      buildConfigurations = (
                          000000000000000000000019 /* Debug */,
                          000000000000000000000020 /* Release */,
