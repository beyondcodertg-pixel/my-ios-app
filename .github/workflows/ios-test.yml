name: Test iOS WebView App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Get my code
        uses: actions/checkout@v4
      
      - name: Check files exist
        run: |
          echo "Files in repo:"
          ls -la
          echo "Checking for index.html:"
          test -f index.html && echo "✅ index.html found" || echo "❌ index.html NOT found"
      
      - name: Build iOS app using Xcode command line
        run: |
          # Create a minimal iOS app structure
          APP_NAME="MyWebApp"
          mkdir -p $APP_NAME/$APP_NAME
          
          # Create AppDelegate.swift
          cat > $APP_NAME/$APP_NAME/AppDelegate.swift << 'SWIFT_EOF'
          import UIKit
          import WebKit

          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  let viewController = ViewController()
                  window?.rootViewController = viewController
                  window?.makeKeyAndVisible()
                  return true
              }
          }

          class ViewController: UIViewController {
              override func viewDidLoad() {
                  super.viewDidLoad()
                  let webView = WKWebView(frame: view.bounds)
                  webView.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  view.addSubview(webView)
                  
                  if let path = Bundle.main.path(forResource: "index", ofType: "html") {
                      let url = URL(fileURLWithPath: path)
                      webView.loadFileURL(url, allowingReadAccessTo: url.deletingLastPathComponent())
                  } else {
                      print("❌ Could not find index.html")
                  }
              }
          }
          SWIFT_EOF
          
          # Copy HTML into app
          cp index.html $APP_NAME/$APP_NAME/
          
          # Build using swiftc directly (no Xcode project needed)
          cd $APP_NAME
          
          # Compile the Swift files
          swiftc -target arm64-apple-ios15.0-simulator \
                 -sdk $(xcrun --show-sdk-path --sdk iphonesimulator) \
                 -framework UIKit \
                 -framework WebKit \
                 $APP_NAME/AppDelegate.swift \
                 -o $APP_NAME.app/$APP_NAME || true
          
          echo "Build attempted. Checking results..."
          ls -la
        shell: bash
        continue-on-error: true
      
      - name: Alternative: Just validate HTML works
        run: |
          echo "✅ Your HTML file is present and ready"
          echo "HTML file size:"
          wc -c index.html
          echo "First 20 lines of your HTML:"
          head -20 index.html
