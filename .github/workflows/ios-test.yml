name: Test iOS WebView App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Get my code
        uses: actions/checkout@v4
      
      - name: Create iOS app with my HTML
        run: |
          # Create app folders
          mkdir -p MyWebApp/MyWebApp
          
          # Create the Swift code that loads your HTML
          cat > MyWebApp/MyWebApp/ViewController.swift << 'EOF'
          import UIKit
          import WebKit
          class ViewController: UIViewController {
              override func viewDidLoad() {
                  super.viewDidLoad()
                  let webView = WKWebView(frame: view.bounds)
                  webView.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  view.addSubview(webView)
                  if let path = Bundle.main.path(forResource: "index", ofType: "html") {
                      let url = URL(fileURLWithPath: path)
                      webView.loadFileURL(url, allowingReadAccessTo: url)
                  }
              }
          }
          EOF
          
          # Create AppDelegate.swift
          cat > MyWebApp/MyWebApp/AppDelegate.swift << 'EOF'
          import UIKit
          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = ViewController()
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          EOF
          
          # Create Info.plist
          cat > MyWebApp/MyWebApp/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>com.test.myapp</string>
              <key>CFBundleName</key>
              <string>MyWebApp</string>
              <key>CFBundleVersion</key>
              <string>1.0</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>armv7</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
          </dict>
          </plist>
          EOF
          
          # Create project.pbxproj (minimal Xcode project file)
          mkdir -p MyWebApp/MyWebApp.xcodeproj
          cat > MyWebApp/MyWebApp.xcodeproj/project.pbxproj << 'EOF'
